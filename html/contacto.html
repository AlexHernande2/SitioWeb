<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/contacto.css">
</head>

<body>

    <div class="container-form">

        <form action="" class="formulario_contacto">
            <h1 class="titulo">Contactar</h1>
            <label for="nombre">Nombre</label>
            <input type="text" class="nombre" required>
            <label for="contacto">Contacto</label>
            <input type="email" class="contacto" required placeholder="example@gmail.com">
            <label for="descripcion">Texto</label>
            <textarea name="" id="descripcion" required placeholder="Te escribimos de empresas Bolivar......"></textarea>
            <div class="container-btn">
                <button type="submit" class="btn_enviar primary">Enviar</button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script src="../js/contacto.js"></script>

</body>

</html>
